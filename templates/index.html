<!DOCTYPE html>

<!--
========================================================
    IA CHAT LOCAL 🤖
    Streaming Chat con Flask + Ollama

    ES:
    Interfaz simple para hablar con una IA local
    usando streaming en tiempo real.

    EN:
    Simple interface to chat with a local AI
    using real-time streaming.
========================================================
-->

<html lang="es">

<head>

    <!-- CONFIGURACIÓN / CONFIG -->
    <meta charset="UTF-8">

    <!-- RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- TÍTULO -->
    <title>IA Chat Streaming</title>

<style>

/* =========================================================
    ESTILOS GENERALES
    GENERAL STYLES
========================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{

    background:#0f0f0f;

    color:white;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;
}

/* =========================================================
    CONTENEDOR PRINCIPAL
    MAIN CONTAINER
========================================================= */

.chat{

    width:90%;

    max-width:900px;

    height:90vh;

    background:#181818;

    border-radius:20px;

    overflow:hidden;

    display:flex;

    flex-direction:column;

    border:1px solid #2a2a2a;
}

/* =========================================================
    HEADER
========================================================= */

.header{

    padding:20px;

    background:#202020;

    font-size:22px;

    font-weight:bold;

    border-bottom:1px solid #2a2a2a;
}

/* =========================================================
    MENSAJES
    MESSAGES
========================================================= */

.messages{

    flex:1;

    overflow-y:auto;

    padding:20px;

    display:flex;

    flex-direction:column;

    gap:15px;
}

/* =========================================================
    BURBUJAS
    CHAT BUBBLES
========================================================= */

.msg{

    max-width:75%;

    padding:15px;

    border-radius:15px;

    line-height:1.5;

    word-wrap:break-word;
}

/* USUARIO / USER */

.user{

    align-self:flex-end;

    background:#2563eb;
}

/* IA / AI */

.bot{

    align-self:flex-start;

    background:#2a2a2a;
}

/* =========================================================
    INPUT AREA
========================================================= */

.input-area{

    display:flex;

    gap:10px;

    padding:15px;

    background:#202020;

    border-top:1px solid #2a2a2a;
}

/* =========================================================
    TEXTAREA
========================================================= */

textarea{

    flex:1;

    resize:none;

    border:none;

    outline:none;

    border-radius:12px;

    background:#2b2b2b;

    color:white;

    padding:15px;

    font-size:16px;
}

/* =========================================================
    BOTÓN
    BUTTON
========================================================= */

button{

    border:none;

    border-radius:12px;

    padding:15px 20px;

    background:#2563eb;

    color:white;

    cursor:pointer;

    transition:.2s;
}

button:hover{

    background:#1d4ed8;
}

/* =========================================================
    SCROLLBAR
========================================================= */

::-webkit-scrollbar{

    width:8px;
}

::-webkit-scrollbar-thumb{

    background:#333;

    border-radius:10px;
}

</style>

</head>

<body>

<!-- =========================================================
    CHAT
========================================================= -->

<div class="chat">

    <!-- HEADER -->
    <div class="header">

        IA Local 🤖

    </div>

    <!-- MENSAJES -->
    <div class="messages" id="chatBox">

        <div class="msg bot">

            Hola. Soy una IA local sobreviviendo
            dentro de una laptop con estrés térmico 🔥

        </div>

    </div>

    <!-- INPUT -->
    <div class="input-area">

        <textarea
            id="mensaje"
            rows="1"
            placeholder="Escribe algo..."
        ></textarea>

        <button onclick="enviarMensaje()">

            Enviar

        </button>

    </div>

</div>

<script>

/* =========================================================
    ENVIAR MENSAJE
    SEND MESSAGE
========================================================= */

async function enviarMensaje(){

    // OBTENER INPUT
    // GET INPUT
    let input = document.getElementById("mensaje");

    // OBTENER TEXTO
    // GET TEXT
    let mensaje = input.value.trim();

    // SI ESTÁ VACÍO
    // IF EMPTY
    if(mensaje === "") return;

    // CHATBOX
    let chatBox = document.getElementById("chatBox");

    /* =====================================================
        MENSAJE DEL USUARIO
        USER MESSAGE
    ===================================================== */

    let userMsg = document.createElement("div");

    userMsg.className = "msg user";

    userMsg.innerText = mensaje;

    chatBox.appendChild(userMsg);

    /* =====================================================
        LIMPIAR INPUT
        CLEAR INPUT
    ===================================================== */

    input.value = "";

    /* =====================================================
        MENSAJE DE IA
        AI MESSAGE
    ===================================================== */

    let botMsg = document.createElement("div");

    botMsg.className = "msg bot";

    botMsg.innerText = "";

    chatBox.appendChild(botMsg);

    // SCROLL
    chatBox.scrollTop = chatBox.scrollHeight;

    /* =====================================================
        FETCH STREAMING
    ===================================================== */

    try{

        let respuesta = await fetch("/chat", {

            method:"POST",

            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },

            body:"mensaje=" + encodeURIComponent(mensaje)

        });

        /* =================================================
            LEER STREAM
            READ STREAM
        ================================================= */

        const reader = respuesta.body.getReader();

        const decoder = new TextDecoder();

        while(true){

            // LEER CHUNK
            const {done, value} = await reader.read();

            // SI TERMINÓ
            if(done) break;

            // DECODIFICAR TEXTO
            let texto = decoder.decode(value);

            // AGREGAR TEXTO
            botMsg.innerText += texto;

            // AUTO SCROLL
            chatBox.scrollTop = chatBox.scrollHeight;
        }

    }

    catch(error){

        botMsg.innerText = "Error conectando con la IA.";
    }
}

/* =========================================================
    ENTER PARA ENVIAR
    ENTER TO SEND
========================================================= */

document.getElementById("mensaje")
.addEventListener("keydown", function(event){

    // ENTER SIN SHIFT
    // ENTER WITHOUT SHIFT
    if(event.key === "Enter" && !event.shiftKey){

        event.preventDefault();

        enviarMensaje();
    }

});

</script>

</body>
</html>
