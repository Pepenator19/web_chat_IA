<!DOCTYPE html>

<!--
========================================================
    IA CHAT LOCAL 🤖
    Chat simple con Flask + Ollama

    ES:
    Interfaz sencilla para hablar con una IA local.

    EN:
    Simple interface to chat with a local AI.
========================================================
-->

<html lang="es">

<head>

    <!-- CONFIGURACIÓN / CONFIG -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>IA Chat</title>

    <style>

        /* =====================================================
            ESTILOS GENERALES
            GENERAL STYLES
        ===================================================== */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            background:#0f0f0f;

            color:white;

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        /* =====================================================
            CONTENEDOR PRINCIPAL
            MAIN CONTAINER
        ===================================================== */

        .chat{

            width:90%;

            max-width:900px;

            height:90vh;

            background:#181818;

            border-radius:20px;

            display:flex;

            flex-direction:column;

            overflow:hidden;
        }

        /* =====================================================
            HEADER
        ===================================================== */

        .header{

            padding:20px;

            background:#202020;

            font-size:22px;

            font-weight:bold;
        }

        /* =====================================================
            CAJA DE MENSAJES
            MESSAGE BOX
        ===================================================== */

        .messages{

            flex:1;

            padding:20px;

            overflow-y:auto;

            display:flex;

            flex-direction:column;

            gap:15px;
        }

        /* =====================================================
            MENSAJES
            MESSAGES
        ===================================================== */

        .msg{

            max-width:75%;

            padding:15px;

            border-radius:15px;

            line-height:1.5;
        }

        /* USUARIO / USER */

        .user{

            align-self:flex-end;

            background:#2563eb;
        }

        /* IA / AI */

        .bot{

            align-self:flex-start;

            background:#2a2a2a;
        }

        /* =====================================================
            INPUT AREA
        ===================================================== */

        .input-area{

            display:flex;

            gap:10px;

            padding:15px;

            background:#202020;
        }

        /* =====================================================
            TEXTAREA
        ===================================================== */

        textarea{

            flex:1;

            padding:15px;

            border:none;

            outline:none;

            resize:none;

            border-radius:12px;

            background:#2b2b2b;

            color:white;

            font-size:16px;
        }

        /* =====================================================
            BOTÓN
            BUTTON
        ===================================================== */

        button{

            padding:15px 20px;

            border:none;

            border-radius:12px;

            background:#2563eb;

            color:white;

            cursor:pointer;
        }

        button:hover{

            background:#1d4ed8;
        }

    </style>

</head>

<body>

    <!-- =====================================================
        CHAT
    ===================================================== -->

    <div class="chat">

        <!-- HEADER -->
        <div class="header">

            IA Local 🤖

        </div>

        <!-- MENSAJES -->
        <div class="messages" id="chatBox">

            <div class="msg bot">

                Hola. Soy una IA local sobreviviendo
                dentro de una laptop. 🔥

            </div>

        </div>

        <!-- INPUT -->
        <div class="input-area">

            <textarea
                id="mensaje"
                rows="1"
                placeholder="Escribe algo..."
            ></textarea>

            <button onclick="enviarMensaje()">

                Enviar

            </button>

        </div>

    </div>

<script>

/* =========================================================
    ENVIAR MENSAJE
    SEND MESSAGE
========================================================= */

async function enviarMensaje(){

    // INPUT
    let input = document.getElementById("mensaje");

    // TEXTO
    let mensaje = input.value.trim();

    // SI ESTÁ VACÍO
    // IF EMPTY
    if(mensaje === "") return;

    // CHATBOX
    let chatBox = document.getElementById("chatBox");

    /* =====================================================
        MENSAJE USUARIO
        USER MESSAGE
    ===================================================== */

    let userMsg = document.createElement("div");

    userMsg.className = "msg user";

    userMsg.innerText = mensaje;

    chatBox.appendChild(userMsg);

    // LIMPIAR INPUT
    // CLEAR INPUT
    input.value = "";

    /* =====================================================
        MENSAJE TEMPORAL IA
        TEMP AI MESSAGE
    ===================================================== */

    let botMsg = document.createElement("div");

    botMsg.className = "msg bot";

    botMsg.innerText = "Pensando...";

    chatBox.appendChild(botMsg);

    // SCROLL ABAJO
    chatBox.scrollTop = chatBox.scrollHeight;

    /* =====================================================
        FETCH A FLASK
    ===================================================== */

    try{

        let respuesta = await fetch("/chat", {

            method:"POST",

            headers:{
                "Content-Type":"application/x-www-form-urlencoded"
            },

            body:"mensaje=" + encodeURIComponent(mensaje)

        });

        // RESPUESTA IA
        // AI RESPONSE
        let texto = await respuesta.text();

        // MOSTRAR RESPUESTA
        // SHOW RESPONSE
        botMsg.innerText = texto;

    }

    catch(error){

        // ERROR
        botMsg.innerText = "Error conectando con la IA.";

    }

    // SCROLL FINAL
    chatBox.scrollTop = chatBox.scrollHeight;
}

/* =========================================================
    ENTER PARA ENVIAR
    ENTER TO SEND
========================================================= */

document.getElementById("mensaje")
.addEventListener("keydown", function(event){

    // ENTER SIN SHIFT
    // ENTER WITHOUT SHIFT
    if(event.key === "Enter" && !event.shiftKey){

        event.preventDefault();

        enviarMensaje();
    }

});

</script>

</body>
</html>
